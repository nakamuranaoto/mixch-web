<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixch 特典履行管理</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #ee5a24;
    --brand2: #ff6b6b;
    --dark: #1a1a2e;
    --mid: #16213e;
    --accent: #00d2d3;
    --text: #c8d6e5;
    --muted: #8899aa;
    --surface: #0f3460;
    --success: #1dd1a1;
    --warn: #ffd32a;
    --danger: #ff6b6b;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── ログイン画面 ── */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }
  .login-box {
    width: 100%;
    max-width: 380px;
    background: var(--mid);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 20px;
    padding: 40px 32px;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo .icon {
    font-size: 48px;
    display: block;
    margin-bottom: 10px;
  }
  .login-logo h1 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }
  .login-logo p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .form-input {
    width: 100%;
    background: var(--dark);
    border: 1.5px solid rgba(255,255,255,.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .login-error {
    background: rgba(255,107,107,.1);
    border: 1px solid rgba(255,107,107,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 16px;
    display: none;
  }

  /* ── ボタン ── */
  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .btn-primary {
    background: linear-gradient(135deg, var(--brand2), var(--brand));
    color: #fff;
    width: 100%;
    padding: 14px;
    font-size: 15px;
  }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
  }
  .btn-accent {
    background: var(--accent);
    color: var(--dark);
  }
  .btn-danger {
    background: rgba(255,107,107,.15);
    color: var(--danger);
    border: 1px solid rgba(255,107,107,.3);
  }
  .btn-sm { padding: 7px 14px; font-size: 12px; }

  /* ── メインレイアウト ── */
  #mainApp { display: none; }

  .top-bar {
    background: var(--mid);
    border-bottom: 1px solid rgba(255,255,255,.06);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar .logo { font-size: 18px; font-weight: 700; color: #fff; flex: 1; }
  .top-bar .logo span { color: var(--brand2); }
  .user-badge {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    padding: 5px 10px;
    border-radius: 20px;
  }

  /* ── タブ ── */
  .tabs {
    display: flex;
    background: var(--mid);
    border-bottom: 1px solid rgba(255,255,255,.06);
    padding: 0 20px;
    gap: 4px;
  }
  .tab-btn {
    padding: 14px 18px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-panel { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
  .tab-panel.active { display: block; }

  /* ── CSV生成タブ ── */
  .card {
    background: var(--mid);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 16px;
  }
  .input-row { display: flex; gap: 10px; }
  .url-input {
    flex: 1;
    background: var(--dark);
    border: 1.5px solid rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .url-input::placeholder { color: var(--muted); }
  .url-input:focus { border-color: var(--accent); }

  .status-box {
    display: none;
    margin-top: 16px;
    padding: 14px;
    background: var(--dark);
    border-radius: 10px;
    font-size: 13px;
    line-height: 2;
  }
  .status-box.show { display: block; }
  .log-line { display: flex; align-items: baseline; gap: 8px; }
  .spinner {
    display: inline-block;
    width: 13px; height: 13px;
    border: 2px solid rgba(0,210,211,.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 結果カード */
  .result-card { display: none; }
  .result-card.show { display: block; }
  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .meta-item {
    background: var(--dark);
    border-radius: 10px;
    padding: 11px 14px;
  }
  .meta-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .meta-value { font-size: 14px; font-weight: 700; color: #fff; }
  .type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }
  .type-photo    { background: rgba(99,179,237,.2); color: #63b3ed; }
  .type-music    { background: rgba(154,130,255,.2); color: #9a82ff; }
  .type-cosmetics{ background: rgba(255,105,180,.2); color: #ff69b4; }
  .type-general  { background: rgba(255,211,42,.2);  color: var(--warn); }
  .reason-box {
    background: var(--dark);
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    line-height: 1.6;
  }
  .notes-box {
    background: rgba(238,90,36,.1);
    border: 1px solid rgba(238,90,36,.3);
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 13px;
    color: #ffb347;
    margin-bottom: 10px;
    line-height: 1.6;
  }
  .csv-preview {
    background: var(--dark);
    border-radius: 10px;
    padding: 12px;
    font: 11px/1.7 "SF Mono", "Courier New", monospace;
    color: var(--accent);
    overflow-x: auto;
    max-height: 160px;
    overflow-y: auto;
    white-space: pre;
    margin-bottom: 10px;
  }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-dl {
    background: var(--success);
    color: var(--dark);
    flex: 1;
    padding: 13px;
    font-size: 14px;
    text-align: center;
  }
  .btn-save-cloud {
    background: var(--surface);
    color: var(--accent);
    border: 1px solid rgba(0,210,211,.25);
    padding: 13px 20px;
    font-size: 14px;
  }

  /* ── 履歴タブ ── */
  .history-item {
    background: var(--mid);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color .2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-delete-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity .15s, color .15s, background .15s;
    flex-shrink: 0;
  }
  .history-item:hover .history-delete-btn { opacity: 1; }
  .history-delete-btn:hover { color: var(--danger); background: rgba(255,107,107,.12); }
  .history-info { flex: 1; min-width: 0; }
  .history-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .history-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface);
    color: var(--accent);
    white-space: nowrap;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; display: block; margin-bottom: 12px; }

  /* ── 履行管理タブ ── */
  .fulfillment-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .fulfillment-header h2 {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .progress-bar-wrap {
    background: var(--dark);
    border-radius: 8px;
    height: 6px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 8px;
    transition: width .4s;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    text-align: right;
  }

  /* フルフィルメントテーブル */
  .fulfill-table-wrap { overflow-x: auto; }
  .fulfill-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 600px;
  }
  .fulfill-table th {
    background: var(--surface);
    color: var(--muted);
    font-weight: 700;
    padding: 9px 12px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .05em;
    white-space: nowrap;
  }
  .fulfill-table td {
    padding: 9px 12px;
    border-bottom: 1px solid rgba(255,255,255,.05);
    vertical-align: middle;
  }
  .fulfill-table tr:hover td { background: rgba(255,255,255,.02); }
  .fulfill-table td:first-child { font-weight: 700; color: #fff; }
  .check-cell { text-align: center; }
  .check-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,.2);
    background: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all .15s;
    color: transparent;
  }
  .check-btn.checked {
    background: var(--success);
    border-color: var(--success);
    color: var(--dark);
  }
  .check-btn:hover { border-color: var(--accent); }

  /* ── テキスト編集セル ── */
  .edit-cell {
    background: transparent;
    border: none;
    border-bottom: 1px dashed rgba(255,255,255,.2);
    color: var(--text);
    font-size: 13px;
    width: 100%;
    min-width: 80px;
    padding: 3px 4px;
    outline: none;
    font-family: inherit;
  }
  .edit-cell:focus {
    border-bottom: 1.5px solid var(--accent);
    background: rgba(0,210,211,.05);
    border-radius: 3px 3px 0 0;
  }
  .edit-cell::placeholder { color: var(--muted); opacity: .5; }

  /* ── 手動追加行 ── */
  .manual-row td { border-left: 2px solid var(--accent); }
  .manual-row td:not(:first-child) { border-left: none; }
  .manual-row { background: rgba(0,210,211,.04); }
  .delete-row-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    padding: 3px 7px;
    border-radius: 4px;
    transition: color .15s, background .15s;
  }
  .delete-row-btn:hover { color: var(--danger); background: rgba(255,107,107,.12); }
  .add-row-wrap { padding: 10px 0 4px; }
  .add-row-btn {
    background: transparent;
    border: 1px dashed rgba(255,255,255,.2);
    color: var(--muted);
    width: 100%;
    padding: 9px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    transition: border-color .2s, color .2s;
  }
  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── スケルトンローダー ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,.05) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    height: 16px;
    margin: 6px 0;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── トースト ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
    transition: transform .3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">🎯</span>
      <h1>Mixch 特典履行管理</h1>
      <p>チームメンバー専用ツール</p>
    </div>
    <div class="login-error" id="loginError"></div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" class="form-input" id="emailInput" placeholder="team@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" class="form-input" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- メインアプリ -->
<div id="mainApp">
  <!-- トップバー -->
  <div class="top-bar">
    <div class="logo">🎯 <span>Mixch</span> 特典履行管理</div>
    <div class="user-badge" id="userBadge">-</div>
    <button class="btn btn-secondary btn-sm" onclick="doLogout()">ログアウト</button>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('csv', this)">📊 CSV生成</button>
    <button class="tab-btn" onclick="switchTab('history', this)">📁 履歴</button>
    <button class="tab-btn" onclick="switchTab('fulfill', this)">✅ 履行管理</button>
  </div>

  <!-- CSV生成タブ -->
  <div class="tab-panel active" id="tab-csv">
    <div class="card">
      <div class="card-title">イベントURL</div>
      <div class="input-row">
        <input id="urlInput" class="url-input" type="url"
          placeholder="https://mixch.tv/live/event/XXXXX" autocomplete="off"/>
        <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()" style="width:auto;padding:12px 20px">
          CSV生成
        </button>
      </div>
      <div class="status-box" id="statusBox"></div>
    </div>

    <div class="card result-card" id="resultCard">
      <div class="card-title">📊 解析結果</div>
      <div class="meta-grid" id="metaGrid"></div>
      <div id="reasonBox" class="reason-box" style="display:none"></div>
      <div id="notesBox" class="notes-box" style="display:none"></div>
      <div class="card-title" style="margin-top:16px">📄 CSVプレビュー</div>
      <div class="csv-preview" id="csvPreview"></div>
      <div class="btn-row">
        <button class="btn btn-dl" onclick="downloadCSV()">⬇️ ダウンロード</button>
        <button class="btn btn-save-cloud" onclick="saveToCloud()">☁️ クラウドに保存</button>
        <button class="btn btn-secondary btn-sm" onclick="copyCSV()">📋 コピー</button>
      </div>
    </div>
  </div>

  <!-- 履歴タブ -->
  <div class="tab-panel" id="tab-history">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="font-size:15px;font-weight:700;color:#fff;flex:1">保存済みイベント</div>
      <button class="btn btn-secondary btn-sm" onclick="loadHistory()">🔄 更新</button>
    </div>
    <div id="historyList"><div class="skeleton"></div><div class="skeleton" style="width:70%"></div></div>
  </div>

  <!-- 履行管理タブ -->
  <div class="tab-panel" id="tab-fulfill">
    <div id="fulfillContent">
      <div class="empty-state">
        <span class="icon">✅</span>
        <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px">履行管理</div>
        <div>履歴タブからイベントを選択すると<br>ここに管理表が表示されます</div>
      </div>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc,
  query, orderBy, onSnapshot, getDoc, deleteDoc, arrayUnion, arrayRemove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3vywcoezXCMpN--y8OEJgEPtt08C1Q4k",
  authDomain: "mixch-web.firebaseapp.com",
  projectId: "mixch-web",
  storageBucket: "mixch-web.firebasestorage.app",
  messagingSenderId: "652860456377",
  appId: "1:652860456377:web:7c10371b16e6859d0eca68"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── グローバル状態 ───────────────────────────
let _csv = "";
let _filename = "";
let _currentMeta = null;
let _currentEventId = null; // Firestore doc id
let _unsubFulfill = null;

window._db = db;
window._auth = auth;

// ─── Auth ────────────────────────────────────
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    document.getElementById("userBadge").textContent = user.email;
    loadHistory();
  } else {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("mainApp").style.display = "none";
  }
});

window.doLogin = async function() {
  const email = document.getElementById("emailInput").value.trim();
  const pw = document.getElementById("passwordInput").value;
  const errEl = document.getElementById("loginError");
  const btn = document.getElementById("loginBtn");
  errEl.style.display = "none";
  btn.disabled = true;
  btn.textContent = "ログイン中...";
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    errEl.textContent = "メールアドレスまたはパスワードが正しくありません";
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "ログイン";
  }
};

window.doLogout = async function() {
  await signOut(auth);
};

// Enter key for login
document.getElementById("passwordInput").addEventListener("keydown", e => {
  if (e.key === "Enter") window.doLogin();
});

// ─── タブ ────────────────────────────────────
window.switchTab = function(tab, el) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-" + tab).classList.add("active");
  if (tab === "history") loadHistory();
};

// ─── CSV生成 ──────────────────────────────────
function log(icon, text, type = "info") {
  const box = document.getElementById("statusBox");
  box.classList.add("show");
  const line = document.createElement("div");
  line.className = `log-line ${type}`;
  if (icon === "spin") {
    line.innerHTML = `<span class="spinner"></span><span>${text}</span>`;
  } else {
    line.innerHTML = `<span>${icon}</span><span>${text}</span>`;
  }
  box.appendChild(line);
}
function clearLog() {
  const box = document.getElementById("statusBox");
  box.innerHTML = "";
  box.classList.remove("show");
}
function typeBadge(type) {
  const map = {
    photo: ["撮影系","type-photo"], music: ["楽曲系","type-music"],
    cosmetics: ["物販系","type-cosmetics"], general: ["汎用","type-general"],
  };
  const [label, cls] = map[type] || ["不明","type-general"];
  return `<span class="type-badge ${cls}">${label}</span>`;
}

window.analyze = async function() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url || !url.includes("mixch.tv")) { showToast("MixchのイベントURLを入力してください", "error"); return; }
  clearLog();
  _csv = ""; _filename = ""; _currentMeta = null;
  document.getElementById("resultCard").classList.remove("show");
  const btn = document.getElementById("analyzeBtn");
  btn.disabled = true;
  log("spin", "データ取得・AI解析中...");
  try {
    const res = await fetch("/.netlify/functions/analyze-event", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!data.success) { log("❌", `エラー: ${data.error}`, "error"); return; }
    const m = data.meta;
    log("✅", m.title, "success");
    log("👥", `参加者: ${m.userCount}人`, "info");
    if (m.thresholds.length > 0) log("🎯", `閾値: ${m.thresholds.map(t=>t/10000+"万pt").join(", ")}`, "info");
    log("🤖", `AI判定: ${m.eventType}`, "info");
    log("✅", "CSV生成完了！", "success");
    _csv = data.csv; _filename = m.filename; _currentMeta = m;

    document.getElementById("resultCard").classList.add("show");
    document.getElementById("metaGrid").innerHTML = `
      <div class="meta-item"><div class="meta-label">イベント</div><div class="meta-value" style="font-size:12px">${m.title}</div></div>
      <div class="meta-item"><div class="meta-label">参加者数</div><div class="meta-value">${m.userCount} 人</div></div>
      <div class="meta-item"><div class="meta-label">種別</div><div class="meta-value">${typeBadge(m.eventType)}</div></div>
      <div class="meta-item"><div class="meta-label">閾値</div><div class="meta-value" style="font-size:12px">${m.thresholds.length>0?m.thresholds.map(t=>t/10000+"万pt").join(" / "):"なし"}</div></div>
    `;
    const rb = document.getElementById("reasonBox");
    rb.textContent = "💡 " + m.eventTypeReason; rb.style.display = "block";
    const nb = document.getElementById("notesBox");
    if (m.specialNotes) { nb.textContent = "⚠️ " + m.specialNotes; nb.style.display = "block"; }
    else nb.style.display = "none";
    const lines = _csv.replace(/^﻿/, "").split("\r\n");
    document.getElementById("csvPreview").textContent = lines.slice(0, 4).join("\n");
  } catch(e) {
    log("❌", `通信エラー: ${e.message}`, "error");
  } finally { btn.disabled = false; }
};

window.downloadCSV = function() {
  if (!_csv) return;
  const blob = new Blob([_csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = _filename; a.click();
};

window.copyCSV = function() {
  if (!_csv) return;
  navigator.clipboard.writeText(_csv).then(() => showToast("CSVをコピーしました", "success"));
};

window.saveToCloud = async function() {
  if (!_csv || !_currentMeta) return;
  const user = auth.currentUser;
  if (!user) return;
  try {
    const m = _currentMeta;
    const docRef = await addDoc(collection(db, "events"), {
      eventId: m.eventId,
      title: m.title,
      userCount: m.userCount,
      thresholds: m.thresholds,
      eventType: m.eventType,
      eventTypeReason: m.eventTypeReason,
      specialNotes: m.specialNotes || "",
      csv: _csv,
      filename: m.filename,
      savedAt: new Date().toISOString(),
      savedBy: user.email,
      fulfillment: {},
    });
    showToast("クラウドに保存しました ☁️", "success");
    loadHistory();
  } catch(e) {
    showToast("保存エラー: " + e.message, "error");
  }
};

// Enterキーで実行
document.getElementById("urlInput").addEventListener("keydown", e => {
  if (e.key === "Enter") window.analyze();
});

// ─── 履歴 ──────────────────────────────────────
window.loadHistory = async function() {
  const listEl = document.getElementById("historyList");
  listEl.innerHTML = `<div class="skeleton"></div><div class="skeleton" style="width:70%"></div>`;
  try {
    const q = query(collection(db, "events"), orderBy("savedAt", "desc"));
    const snap = await getDocs(q);
    if (snap.empty) {
      listEl.innerHTML = `<div class="empty-state"><span class="icon">📭</span>まだ保存されたイベントはありません<br><small>CSV生成後「クラウドに保存」してください</small></div>`;
      return;
    }
    listEl.innerHTML = "";
    snap.forEach(d => {
      const ev = d.data();
      const date = ev.savedAt ? ev.savedAt.slice(0,10) : "";
      const fulfilled = Object.values(ev.fulfillment||{}).filter(Boolean).length;
      const total = Object.keys(ev.fulfillment||{}).length;
      const item = document.createElement("div");
      item.className = "history-item";
      item.innerHTML = `
        <div style="font-size:22px">${ev.eventType==="photo"?"📸":ev.eventType==="music"?"🎵":ev.eventType==="cosmetics"?"💄":"🎁"}</div>
        <div class="history-info">
          <div class="history-title">${ev.title}</div>
          <div class="history-meta">${date} · ${ev.userCount}人 · ${ev.savedBy||""}</div>
        </div>
        ${total>0?`<div class="history-badge">${fulfilled}/${total} 完了</div>`:`<div class="history-badge">${typeLabelText(ev.eventType)}</div>`}
        <button class="history-delete-btn" title="削除" data-id="${d.id}">🗑️</button>
      `;
      item.querySelector(".history-delete-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        deleteEvent(d.id, ev.title);
      });
      item.addEventListener("click", () => openFulfillment(d.id, ev));
      listEl.appendChild(item);
    });
  } catch(e) {
    listEl.innerHTML = `<div class="empty-state"><span class="icon">⚠️</span>${e.message}</div>`;
  }
};

window.deleteEvent = async function(docId, title) {
  if (!confirm(`「${title}」を削除しますか？\nこの操作は元に戻せません。`)) return;
  try {
    await deleteDoc(doc(db, "events", docId));
    showToast("削除しました", "info");
    loadHistory();
  } catch(e) {
    showToast("削除エラー: " + e.message, "error");
  }
};

function typeLabelText(t) {
  return {photo:"撮影系",music:"楽曲系",cosmetics:"物販系",general:"汎用"}[t]||"不明";
}

// ─── 履行管理 ──────────────────────────────────
async function openFulfillment(docId, ev) {
  // 履行管理タブに切り替え
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn")[2].classList.add("active");
  document.getElementById("tab-fulfill").classList.add("active");

  _currentEventId = docId;
  if (_unsubFulfill) { _unsubFulfill(); _unsubFulfill = null; }

  renderFulfillment(docId, ev);

  // Firestoreのリアルタイム更新を監視
  _unsubFulfill = onSnapshot(doc(db, "events", docId), (snap) => {
    if (snap.exists()) renderFulfillment(docId, snap.data());
  });
}

// 列の種類を判定: "check" | "text"
function getColumnType(col) {
  // 完了チェック系（済み・完了・対象などを含む列）
  const checkKeywords = ["完了","済み","済","発送済","撮影済","配送済","納品済","対象","掲載","調整済","確認済","収集済"];
  if (checkKeywords.some(k => col.includes(k))) return "check";
  return "text"; // それ以外は全てテキスト入力
}

function renderFulfillment(docId, ev) {
  // テキスト入力中は再レンダリングをスキップ（入力内容消失防止）
  const activeEl = document.activeElement;
  if (activeEl && activeEl.classList.contains("edit-cell")) return;

  const csvLines = (ev.csv || "").replace(/^﻿/, "").split("\r\n").filter(Boolean);
  if (csvLines.length < 2) {
    document.getElementById("fulfillContent").innerHTML = `<div class="empty-state"><span class="icon">⚠️</span>CSVデータがありません</div>`;
    return;
  }

  const headers = parseCSVLine(csvLines[0]);
  const rows = csvLines.slice(1).map(parseCSVLine);

  const mgmtStartIdx = headers.findIndex((h,i) => i >= 4 && !h.includes("万pt達成"));
  const mgmtHeaders = mgmtStartIdx >= 0 ? headers.slice(mgmtStartIdx) : [];

  const fulfill = ev.fulfillment || {};
  const manualIds = ev.manual_row_ids || [];

  // チェックボックス列のみでプログレスを計算（CSV行 + 手動行）
  let doneCount = 0, totalCount = 0;
  rows.forEach((row, ri) => {
    mgmtHeaders.forEach((col, ci) => {
      if (getColumnType(col) !== "check") return;
      totalCount++;
      if (fulfill[`${ri}_${ci}`]) doneCount++;
    });
  });
  manualIds.forEach(mId => {
    mgmtHeaders.forEach((col, ci) => {
      if (getColumnType(col) !== "check") return;
      totalCount++;
      if (fulfill[`m_${mId}_${ci}`]) doneCount++;
    });
  });

  const pct = totalCount > 0 ? Math.round(doneCount/totalCount*100) : 0;

  // テキストセルをレンダリングするヘルパー
  function textCell(docId, key, initVal) {
    const saved = typeof fulfill["t_"+key] === "string" ? fulfill["t_"+key] : initVal;
    const esc = saved.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
    return `<td><input class="edit-cell" type="text" value="${esc}" placeholder="—"
      onblur="saveText('${docId}','t_${key}',this.value)"></td>`;
  }

  let html = `
    <div class="fulfillment-header">
      <button class="btn btn-secondary btn-sm" onclick="backToHistory()">← 履歴へ</button>
      <h2>${ev.title}</h2>
      <button class="btn btn-secondary btn-sm" onclick="downloadFromCloud('${docId}')">⬇️ CSV</button>
    </div>
    <div class="progress-label">${doneCount} / ${totalCount} 完了 (${pct}%)</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="fulfill-table-wrap">
    <table class="fulfill-table">
    <thead><tr>
      <th>順位</th><th>ライバー名</th><th>ポイント</th>
      ${mgmtHeaders.map(h=>`<th>${h}</th>`).join("")}
      <th></th>
    </tr></thead>
    <tbody>
  `;

  // CSV行
  rows.forEach((row, ri) => {
    const rank = row[0] || "";
    const name = row[1] || "";
    const pts = row[3] ? parseInt(row[3]).toLocaleString() : "";
    html += `<tr><td>${rank}</td><td>${name}</td><td>${pts}</td>`;
    mgmtHeaders.forEach((col, ci) => {
      const key = `${ri}_${ci}`;
      if (getColumnType(col) === "check") {
        const checked = !!fulfill[key];
        html += `<td class="check-cell"><button class="check-btn${checked?" checked":""}"
          onclick="toggleCheck('${docId}','${key}',this)">${checked?"✓":""}</button></td>`;
      } else {
        const csvVal = row[mgmtStartIdx + ci] || "";
        html += textCell(docId, key, csvVal);
      }
    });
    html += `<td></td></tr>`;
  });

  // 手動追加行
  manualIds.forEach(mId => {
    const rank = typeof fulfill[`t_m_${mId}_rank`] === "string" ? fulfill[`t_m_${mId}_rank`] : "";
    const name = typeof fulfill[`t_m_${mId}_name`] === "string" ? fulfill[`t_m_${mId}_name`] : "";
    const score = typeof fulfill[`t_m_${mId}_score`] === "string" ? fulfill[`t_m_${mId}_score`] : "";
    const escRank = rank.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
    const escName = name.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
    const escScore = score.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
    html += `<tr class="manual-row">
      <td><input class="edit-cell" type="text" value="${escRank}" placeholder="順位"
        onblur="saveText('${docId}','t_m_${mId}_rank',this.value)"></td>
      <td><input class="edit-cell" type="text" value="${escName}" placeholder="ライバー名"
        onblur="saveText('${docId}','t_m_${mId}_name',this.value)"></td>
      <td><input class="edit-cell" type="text" value="${escScore}" placeholder="ポイント"
        onblur="saveText('${docId}','t_m_${mId}_score',this.value)"></td>`;
    mgmtHeaders.forEach((col, ci) => {
      const key = `m_${mId}_${ci}`;
      if (getColumnType(col) === "check") {
        const checked = !!fulfill[key];
        html += `<td class="check-cell"><button class="check-btn${checked?" checked":""}"
          onclick="toggleCheck('${docId}','${key}',this)">${checked?"✓":""}</button></td>`;
      } else {
        html += textCell(docId, key, "");
      }
    });
    html += `<td><button class="delete-row-btn" onclick="deleteManualRow('${docId}','${mId}')" title="この行を削除">×</button></td>`;
    html += `</tr>`;
  });

  html += `</tbody></table></div>
    <div class="add-row-wrap">
      <button class="add-row-btn" onclick="addManualRow('${docId}')">＋ 行を手動追加</button>
    </div>`;
  document.getElementById("fulfillContent").innerHTML = html;
}

window.addManualRow = async function(docId) {
  const newId = Date.now().toString(36);
  try {
    await updateDoc(doc(_db, "events", docId), { manual_row_ids: arrayUnion(newId) });
  } catch(e) {
    showToast("追加エラー: " + e.message, "error");
  }
};

window.deleteManualRow = async function(docId, rowId) {
  if (!confirm("この行を削除しますか？")) return;
  try {
    await updateDoc(doc(_db, "events", docId), { manual_row_ids: arrayRemove(rowId) });
  } catch(e) {
    showToast("削除エラー: " + e.message, "error");
  }
};

window.saveText = async function(docId, key, value) {
  try {
    const update = {};
    update[`fulfillment.${key}`] = value;
    await updateDoc(doc(_db, "events", docId), update);
  } catch(e) {
    showToast("保存エラー: " + e.message, "error");
  }
};

window.toggleCheck = async function(docId, key, btn) {
  const newVal = !btn.classList.contains("checked");
  btn.classList.toggle("checked", newVal);
  btn.textContent = newVal ? "✓" : "";
  try {
    const update = {};
    update[`fulfillment.${key}`] = newVal;
    await updateDoc(doc(_db, "events", docId), update);
  } catch(e) {
    showToast("更新エラー: " + e.message, "error");
    btn.classList.toggle("checked", !newVal);
    btn.textContent = !newVal ? "✓" : "";
  }
};

window.backToHistory = function() {
  if (_unsubFulfill) { _unsubFulfill(); _unsubFulfill = null; }
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn")[1].classList.add("active");
  document.getElementById("tab-history").classList.add("active");
  loadHistory();
};

window.downloadFromCloud = async function(docId) {
  try {
    const snap = await getDoc(doc(_db, "events", docId));
    if (!snap.exists()) return;
    const ev = snap.data();
    const blob = new Blob([ev.csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = ev.filename || "mixch.csv"; a.click();
  } catch(e) { showToast("ダウンロードエラー", "error"); }
};

// ─── CSV パーサー ─────────────────────────────
function parseCSVLine(line) {
  const result = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === "," && !inQ) { result.push(cur); cur = ""; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

// ─── トースト ─────────────────────────────────
window.showToast = function(msg, type = "info") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove("show"), 3000);
};
</script>
